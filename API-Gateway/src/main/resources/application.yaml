server:
  port: 8080

spring:
  application:
    name: api-gateway

  # Connects to your Config Server on Port 8888
  config:
    import: "optional:configserver:http://localhost:8888"

  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true

      routes:
        # 1. Route for Identity/Auth Service
        - id: identity-service
          uri: lb://IDENTITY-SERVICE
          predicates:
            - Path=/api/v1/auth/**

        # 2. Route for Zone Management
        - id: zone-management-service
          uri: lb://ZONE-MANAGEMENT-SERVICE
          predicates:
            - Path=/api/zones/**

        # 3. Route for Local IoT Backend
        - id: iot-backend
          uri: lb://IOT-SERVICE
          predicates:
            - Path=/api/devices/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true