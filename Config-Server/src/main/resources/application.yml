server:
  port: 8888

spring:
  application:
    name: config-server
  cloud:
    config:
      server:
        git:
          uri: https://github.com/WKBASFernando/agms-config-repo.git
          default-label: main
          search-paths: '{application}' # This helps it find files by name

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/