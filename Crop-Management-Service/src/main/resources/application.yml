server:
  port: 8084

spring:
  application:
    name: crop-management-service
  datasource:
    url: jdbc:mysql://localhost:3306/agms_crop_db?createDatabaseIfNotExist=true
    username: root
    password: Ijse@1234
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect

  logging:
    level:
      lk.ijse.Crop_Management_Service.client: DEBUG

  # This tells Spring Boot 3 where to find your Git-based configs
  config:
    import: "optional:configserver:http://localhost:8888"

  # Clean up logs for better readability during the viva
  main:
    log-startup-info: true
    allow-bean-definition-overriding: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true